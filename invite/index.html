<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERCS | Redirecting</title>
    <meta http-equiv="refresh" content="2;url=https://discord.com/oauth2/authorize?client_id=1427020960837402704">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@600&family=Inter:wght@300;400&display=swap');
        
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --font-display: 'Instrument Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-body); 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* Minimalist Progress Bar */
        .progress-wrap {
            width: 180px;
            height: 2px;
            background: var(--border);
            margin: 30px auto;
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            width: 40%;
            height: 100%;
            background: #fff;
            border-radius: 100px;
            animation: slide 1.2s infinite ease-in-out;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 24px;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 300;
        }

        a {
            color: #fff;
            text-decoration: underline;
            text-underline-offset: 4px;
            transition: 0.2s;
        }
        
        a:hover { opacity: 0.7; }

        @keyframes slide {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Connecting to Discord.</h1>
        <div class="progress-wrap">
            <div class="progress-bar"></div>
        </div>
        <p>If you aren't redirected automatically, <a href="https://discord.com/oauth2/authorize?client_id=1427020960837402704">click here</a>.</p>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "https://discord.com/oauth2/authorize?client_id=1427020960837402704";
        }, 2000);
    </script>
</body>
</html>
