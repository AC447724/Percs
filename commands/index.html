<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERCS | Commands Library</title>
    
    <link rel="icon" type="image/png" href="https://percs.fun/assets/brand/logo-no-bg.png">
    
    <meta name="description" content="Search through the PERCS command library.">
    <meta name="theme-color" content="#050505">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --text-primary: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --font-display: 'Instrument Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; width: 100%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .brand { 
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-display); 
            font-weight: 600; 
            font-size: 18px;
            text-decoration: none;
            color: white;
        }
        .brand img { width: 30px; height: 30px; border-radius: 50%; }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a:hover { color: var(--text-primary); }

        .hero { 
            padding: 160px 20px 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 600;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .search-wrapper { max-width: 600px; margin: 0 auto 40px auto; position: relative; }
        .search-bar {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 18px 30px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }
        .search-bar:focus { border-color: rgba(255,255,255,0.3); }

        .categories-container {
            max-width: 1000px;
            margin: 0 auto 60px auto;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cat-pill {
            background: transparent;
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cat-pill span { opacity: 0.5; font-size: 11px; }
        .cat-pill:hover { border-color: var(--text-dim); color: #fff; }
        .cat-pill.active { background: #fff; color: #000; border-color: #fff; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5% 100px 5%;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            transition: 0.3s ease;
        }

        .card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-4px); }

        .cmd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cmd-name { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: #fff; }
        
        .type-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 6px;
            color: var(--text-dim);
        }

        .cmd-desc { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }

        .meta-section {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .meta-item {
            font-size: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .meta-label { color: var(--text-dim); font-weight: 600; text-transform: uppercase; font-size: 10px; }
        
        .tag {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 4px;
            color: #eee;
        }

        .arg-tag {
            background: rgba(255,255,255,0.08);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            color: #fff;
        }

        .usage-container {
            margin-top: auto;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .usage-container:hover { background: rgba(255,255,255,0.08); }
        .usage-text { font-family: monospace; font-size: 13px; color: #fff; opacity: 0.8; }

        #toast {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: #fff; color: #000;
            padding: 12px 24px; border-radius: 100px;
            font-size: 13px; font-weight: 600;
            opacity: 0; transition: 0.3s;
            pointer-events: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <nav>
        <a href="https://percs.fun" class="brand">
            <img src="https://percs.fun/assets/brand/logo.png" alt="Logo">
            PERCS
        </a>
        <div class="nav-links">
            <a href="https://percs.fun">Home</a>
            <a href="#commands" style="color: white;">Commands</a>
            <a href="https://percs.fun/faq">FAQ</a>
            <a href="https://percs.fun/legal">Legal</a>
        </div>
    </nav>

    <div class="hero" id="commands">
        <h1>Command Library</h1>
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-bar" placeholder="Find a command..." onkeyup="processFilter()">
        </div>
        <div class="categories-container" id="catBox"></div>
    </div>

    <div class="grid" id="cmdGrid"></div>

    <div id="toast">Copied to clipboard</div>

    <script>
        let cmdData = [];
        let currentCat = 'All';

        async function init() {
            try {
                const res = await fetch('commands.json');
                if (!res.ok) throw new Error('File not found');
                cmdData = await res.json();
                renderCategories();
                renderCards(cmdData);
            } catch (e) {
                console.error(e);
                document.getElementById('cmdGrid').innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-dim);">Unable to load commands.json from the local directory.</p>`;
            }
        }

        function renderCategories() {
            const counts = cmdData.reduce((acc, cmd) => {
                acc[cmd.category] = (acc[cmd.category] || 0) + 1;
                return acc;
            }, {});

            const uniqueCats = [...new Set(cmdData.map(c => c.category))].sort();
            const container = document.getElementById('catBox');
            
            let html = `<div class="cat-pill ${currentCat === 'All' ? 'active' : ''}" onclick="setCategory('All', this)">All <span>${cmdData.length}</span></div>`;
            html += uniqueCats.map(cat => `<div class="cat-pill ${cat === currentCat ? 'active' : ''}" onclick="setCategory('${cat}', this)">${cat} <span>${counts[cat]}</span></div>`).join('');
            container.innerHTML = html;
        }

        function setCategory(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            processFilter();
        }

        function processFilter() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = cmdData.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(term) || 
                                    c.description.toLowerCase().includes(term) ||
                                    (c.aliases && c.aliases.some(a => a.toLowerCase().includes(term)));
                const matchesCat = currentCat === 'All' || c.category === currentCat;
                return matchesSearch && matchesCat;
            });
            renderCards(filtered);
        }

        function renderCards(data) {
            const grid = document.getElementById('cmdGrid');
            grid.innerHTML = data.map((cmd) => {
                let usageStr = cmd.usage;
                if (!usageStr) {
                    const prefix = cmd.type === 'prefix' ? '.' : '/';
                    const args = cmd.arguments && cmd.arguments.length ? ' ' + cmd.arguments.join(' ') : '';
                    usageStr = `${prefix}${cmd.name}${args}`;
                }

                const aliasHtml = cmd.aliases && cmd.aliases.length > 0 
                    ? `<div class="meta-item"><span class="meta-label">Aliases:</span> ${cmd.aliases.map(a => `<span class="tag">${a}</span>`).join('')}</div>` 
                    : '';

                const argsHtml = cmd.arguments && cmd.arguments.length > 0 
                    ? `<div class="meta-item"><span class="meta-label">Arguments:</span> ${cmd.arguments.map(a => `<span class="arg-tag">${a}</span>`).join('')}</div>` 
                    : '';

                const permsHtml = cmd.permissions && cmd.permissions.length > 0 
                    ? `<div class="meta-item"><span class="meta-label">Permissions:</span> ${cmd.permissions.map(p => `<span class="tag" style="border-color:rgba(255,0,0,0.2)">${p}</span>`).join('')}</div>` 
                    : '';

                return `
                <div class="card">
                    <div class="cmd-header">
                        <span class="cmd-name">${cmd.name}</span>
                        <span class="type-badge">${cmd.type}</span>
                    </div>
                    <p class="cmd-desc">${cmd.description}</p>
                    
                    <div class="meta-section">
                        ${aliasHtml}
                        ${argsHtml}
                        ${permsHtml}
                    </div>

                    <div class="usage-container" onclick="copyText('${usageStr.replace(/'/g, "\\'")}')">
                        <span class="usage-text">${usageStr}</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </div>
                </div>`;
            }).join('');
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        init();
    </script>
</body>
</html>
