<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>district?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');
        :root { --accent: #00f2ff; }
        body { margin: 0; background-color: #020205; overflow: hidden; font-family: 'Space+Mono', monospace; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 40px;
            left: 40px;
            color: #fff;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px var(--accent);
        }
        h1 { 
            margin: 0; 
            font-size: 16px; 
            font-weight: 400; 
            letter-spacing: 6px; 
            color: var(--accent);
        }
        .lil-gui { 
            --background-color: rgba(5, 5, 10, 0.95);
            --widget-color: var(--accent);
            --font-family: 'Space+Mono', monospace;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="title">district</h1>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import GUI from 'lil-gui';

        const params = {
            citySize: 15,
            maxHeight: 20,
            density: 0.7,
            neonColor: '#00f2ff',
            bloomStrength: 1.5,
            speed: 1.0,
            rebuild: () => generate()
        };

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.04);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = params.bloomStrength;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;

        const ambient = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambient);

        let cityGroup = new THREE.Group();
        let vehicles = [];
        scene.add(cityGroup);

        function createBuildingTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#fff';
            for(let i = 0; i < 40; i++) {
                if(Math.random() > 0.5) {
                    ctx.fillRect((i % 8) * 8 + 2, Math.floor(i / 8) * 8 + 2, 4, 4);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        const windowTex = createBuildingTexture();

        function generate() {
            cityGroup.clear();
            vehicles = [];
            const color = new THREE.Color(params.neonColor);
            document.documentElement.style.setProperty('--accent', params.neonColor);

            const grid = 4;
            for (let x = -params.citySize; x < params.citySize; x++) {
                for (let z = -params.citySize; z < params.citySize; z++) {
                    if (Math.random() > params.density) continue;

                    const h = 2 + Math.random() * params.maxHeight;
                    const w = 1.5 + Math.random() * 1;
                    const geo = new THREE.BoxGeometry(w, h, w);
                    
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: 0x050505,
                        emissive: color,
                        emissiveMap: windowTex,
                        emissiveIntensity: 2
                    });

                    const building = new THREE.Mesh(geo, mat);
                    building.position.set(x * grid, h / 2, z * grid);
                    
                    const edges = new THREE.EdgesGeometry(geo);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.3 }));
                    building.add(line);
                    
                    cityGroup.add(building);

                    if(Math.random() > 0.7) {
                        const vGeo = new THREE.BoxGeometry(0.2, 0.1, 0.5);
                        const vMat = new THREE.MeshBasicMaterial({ color: color });
                        const vehicle = new THREE.Mesh(vGeo, vMat);
                        vehicle.userData = { 
                            speed: 0.1 + Math.random() * 0.2,
                            zLimit: params.citySize * grid,
                            lane: x * grid + (Math.random() - 0.5) * 2
                        };
                        vehicle.position.set(vehicle.userData.lane, Math.random() * 10, -vehicle.userData.zLimit);
                        cityGroup.add(vehicle);
                        vehicles.push(vehicle);
                    }
                }
            }
        }

        const gui = new GUI();
        gui.addColor(params, 'neonColor').onChange(v => {
            bloomPass.strength = params.bloomStrength;
            generate();
        });
        gui.add(params, 'bloomStrength', 0, 3).onChange(v => bloomPass.strength = v);
        gui.add(params, 'density', 0.1, 0.9);
        gui.add(params, 'maxHeight', 5, 50);
        gui.add(params, 'speed', 0.1, 5.0);
        gui.add(params, 'rebuild');

        generate();

        function animate() {
            requestAnimationFrame(animate);
            
            vehicles.forEach(v => {
                v.position.z += v.userData.speed * params.speed;
                if(v.position.z > v.userData.zLimit) v.position.z = -v.userData.zLimit;
            });

            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
