<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Perspective</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap');

        body { margin: 0; background-color: #05070a; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 40px;
            left: 40px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 { 
            margin: 0; 
            font-size: 32px; 
            font-weight: 500; 
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #a5a5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            margin: 8px 0 0; 
            font-size: 14px; 
            color: rgba(255, 255, 255, 0.6); 
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>World View</h1>
        <p>Explore the planet through an interactive lens.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 10;
        
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;

        let autoRotateTimeout;
        const resetAutoRotate = () => {
            controls.autoRotate = false;
            clearTimeout(autoRotateTimeout);
            autoRotateTimeout = setTimeout(() => {
                controls.autoRotate = true;
            }, 3000); 
        };

        controls.addEventListener('start', () => {
            clearTimeout(autoRotateTimeout);
            controls.autoRotate = false;
        });

        controls.addEventListener('end', () => {
            resetAutoRotate();
        });

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        const textureLoader = new THREE.TextureLoader();
        const earthTexture = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
        const bumpMap = textureLoader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');

        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshStandardMaterial({
            map: earthTexture,
            bumpMap: bumpMap,
            bumpScale: 0.02,
        });

        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0x222222, size: 0.3 });
        const starVertices = [];
        for (let i = 0; i < 3000; i++) {
            starVertices.push((Math.random() - 0.5) * 1000, (Math.random() - 0.5) * 1000, (Math.random() - 0.5) * 1000);
        }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        scene.add(new THREE.Points(starGeometry, starMaterial));

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
