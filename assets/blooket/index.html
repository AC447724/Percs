<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERCS | Flood Engine v2</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:400,700|Titan+One" />
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --sidebar: #0a0a0a;
            --accent: #df9000;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --success: #00ff88;
            --error: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .brand { font-family: 'Titan One', sans-serif; color: var(--accent); font-size: 22px; margin-bottom: 40px; text-align: center; }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
            font-weight: 600;
        }
        .nav-item.active { background: var(--surface); color: white; }

        .main { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }

        .header h1 { font-family: 'Titan One'; font-size: 32px; letter-spacing: 1px; }
        .header p { color: var(--text-dim); }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-val { font-size: 24px; font-weight: 800; display: block; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .panel { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 30px; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        
        .input-box { display: flex; flex-direction: column; gap: 8px; }
        .input-box label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        
        input { 
            background: var(--bg); border: 1px solid var(--border); padding: 12px; 
            border-radius: 8px; color: white; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .amount-slider { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--accent); }
        .amount-val { background: var(--accent); color: black; padding: 2px 10px; border-radius: 4px; font-weight: 800; min-width: 45px; text-align: center; }

        .btn-container { display: flex; gap: 10px; margin-top: 10px; }
        .launch-btn {
            flex-grow: 3; background: var(--accent); color: black; border: none;
            padding: 18px; border-radius: 8px; font-weight: 800; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        .stop-btn {
            flex-grow: 1; background: var(--error); color: white; border: none;
            padding: 18px; border-radius: 8px; font-weight: 800; font-size: 16px;
            cursor: pointer; transition: 0.2s; display: none;
        }
        .launch-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .launch-btn:disabled { background: #333; cursor: not-allowed; transform: none; }

        .terminal {
            background: #000; border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; font-family: monospace; font-size: 13px; color: #aaa;
            height: 200px; overflow-y: auto;
        }
        .term-line { margin-bottom: 4px; border-left: 2px solid transparent; padding-left: 10px; }
        .term-time { color: #555; margin-right: 10px; }
        .term-success { color: var(--success); border-color: var(--success); }
        .term-error { color: var(--error); border-color: var(--error); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">PERCS.BOT</div>
        <div class="nav-item active">Dashboard</div>
        <div class="nav-item" onclick="window.open('https://discord.gg/percs', '_blank')">Discord</div>
        <div class="nav-item" style="margin-top: auto;">v2.0.4-stable</div>
    </div>

    <div class="main">
        <div class="header">
            <h1>Flood Engine</h1>
            <p>Remote injection via Vercel Edge Functions.</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-label">Connected</span>
                <span class="stat-val" id="activeBots">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Response Time</span>
                <span class="stat-val" id="pingVal">-- ms</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Proxies</span>
                <span class="stat-val">Active</span>
            </div>
        </div>

        <div class="panel">
            <div class="control-grid">
                <div class="input-box">
                    <label>Game Pin</label>
                    <input type="text" id="gameId" placeholder="0000000">
                </div>
                <div class="input-box">
                    <label>Nickname</label>
                    <input type="text" id="botName" placeholder="kfu_">
                </div>
            </div>

            <div class="input-box" style="margin-bottom: 25px;">
                <label>Injection Load</label>
                <div class="amount-slider">
                    <input type="range" id="amountRange" min="1" max="100" value="10" oninput="document.getElementById('amountDisplay').innerText = this.value">
                    <span class="amount-val" id="amountDisplay">10</span>
                </div>
            </div>

            <div class="btn-container">
                <button class="launch-btn" id="launchBtn" onclick="initEngine()">DEPLOY BOTS</button>
                <button class="stop-btn" id="stopBtn" onclick="stopEngine()">ABORT</button>
            </div>
        </div>

        <div class="terminal" id="terminal">
            <div class="term-line"><span class="term-time">[SYSTEM]</span> Ready for deployment.</div>
        </div>
    </div>

    <script>
        let isRunning = false;

        function log(msg, type = '') {
            const term = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString([], { hour12: false });
            const line = document.createElement('div');
            line.className = `term-line ${type ? 'term-' + type : ''}`;
            line.innerHTML = `<span class="term-time">[${time}]</span> ${msg}`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        function stopEngine() {
            isRunning = false;
            log("ABORT COMMAND RECEIVED. Stopping injection...", "error");
        }

        async function initEngine() {
            const id = document.getElementById('gameId').value;
            const name = document.getElementById('botName').value;
            const amount = parseInt(document.getElementById('amountRange').value);
            
            if (!id || !name) return log("ERROR: Missing parameters.", "error");

            isRunning = true;
            document.getElementById('launchBtn').disabled = true;
            document.getElementById('stopBtn').style.display = "block";
            document.getElementById('activeBots').innerText = "0";

            log(`Starting deployment of ${amount} units to ${id}...`);

            for (let i = 1; i <= amount; i++) {
                if (!isRunning) break;

                const botName = `${name}${i}`;
                const startTime = Date.now();
                
                try {
                    // --- REAL API CALL TO YOUR VERCEL BACKEND ---
                    const response = await fetch('/api/join', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ gameId: id, botName: botName })
                    });

                    const latency = Date.now() - startTime;
                    document.getElementById('pingVal').innerText = `${latency}ms`;

                    if (response.ok) {
                        document.getElementById('activeBots').innerText = i;
                        log(`JOINED: ${botName}`, "success");
                    } else {
                        log(`REJECTED: ${botName} (Server Error)`, "error");
                    }
                } catch (err) {
                    log(`FAILED: Network timeout for ${botName}`, "error");
                }

                // Wait 500ms between joins to avoid Blooket's anti-spam
                await new Promise(r => setTimeout(r, 500));
            }

            log("Deployment sequence finalized.");
            document.getElementById('launchBtn').disabled = false;
            document.getElementById('stopBtn').style.display = "none";
            isRunning = false;
        }
    </script>
</body>
</html>
