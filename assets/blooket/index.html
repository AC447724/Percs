<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERCS | Flood Engine</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:400,700|Titan+One" />
    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --sidebar: #0a0a0a;
            --accent: #df9000;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --success: #00ff88;
            --error: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 240px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .brand { font-family: 'Titan One', sans-serif; color: var(--accent); font-size: 22px; margin-bottom: 40px; text-align: center; }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
            font-weight: 600;
        }
        .nav-item:hover, .nav-item.active { background: var(--surface); color: white; }

        /* --- Main Content --- */
        .main { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }

        .header h1 { font-family: 'Titan One'; font-size: 32px; letter-spacing: 1px; }
        .header p { color: var(--text-dim); }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-val { font-size: 24px; font-weight: 800; display: block; }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* --- Input Panel --- */
        .panel { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 30px; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        
        .input-box { display: flex; flex-direction: column; gap: 8px; }
        .input-box label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        
        input { 
            background: var(--bg); border: 1px solid var(--border); padding: 12px; 
            border-radius: 8px; color: white; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .amount-slider { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--accent); }
        .amount-val { background: var(--accent); color: black; padding: 2px 10px; border-radius: 4px; font-weight: 800; min-width: 45px; text-align: center; }

        .launch-btn {
            width: 100%; background: var(--accent); color: black; border: none;
            padding: 18px; border-radius: 8px; font-weight: 800; font-size: 16px;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .launch-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .launch-btn:disabled { background: #333; cursor: not-allowed; transform: none; }

        /* --- Live Terminal --- */
        .terminal {
            background: #000; border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; font-family: monospace; font-size: 13px; color: #aaa;
            height: 200px; overflow-y: auto;
        }
        .term-line { margin-bottom: 4px; border-left: 2px solid transparent; padding-left: 10px; }
        .term-time { color: #555; margin-right: 10px; }
        .term-success { color: var(--success); border-color: var(--success); }
        .term-error { color: var(--error); border-color: var(--error); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">PERCS.BOT</div>
        <div class="nav-item active">Dashboard</div>
        <div class="nav-item">Proxy Settings</div>
        <div class="nav-item">Auto-Play</div>
        <div class="nav-item" style="margin-top: auto;">System Status</div>
    </div>

    <div class="main">
        <div class="header">
            <h1>Flood Engine</h1>
            <p>Targeted game session injection system.</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-label">Total Connected</span>
                <span class="stat-val" id="activeBots">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Engine Health</span>
                <span class="stat-val" style="color: var(--success)">Optimal</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Active Proxies</span>
                <span class="stat-val" id="proxyCount">142</span>
            </div>
        </div>

        <div class="panel">
            <div class="control-grid">
                <div class="input-box">
                    <label>Blooket Game ID</label>
                    <input type="text" id="gameId" placeholder="e.g. 837210">
                </div>
                <div class="input-box">
                    <label>Bot Name Prefix</label>
                    <input type="text" id="botName" placeholder="Player_">
                </div>
            </div>

            <div class="input-box" style="margin-bottom: 25px;">
                <label>Injection Amount (Bot Count)</label>
                <div class="amount-slider">
                    <input type="range" id="amountRange" min="1" max="250" value="25" oninput="updateAmount(this.value)">
                    <span class="amount-val" id="amountDisplay">25</span>
                </div>
            </div>

            <button class="launch-btn" id="launchBtn" onclick="initEngine()">INITIALIZE ENGINE INJECTION</button>
        </div>

        <div class="terminal" id="terminal">
            <div class="term-line"><span class="term-time">[SYSTEM]</span> Awaiting deployment parameters...</div>
        </div>
    </div>

    <script>
        // --- UI UTILITIES ---
        function updateAmount(val) {
            document.getElementById('amountDisplay').innerText = val;
        }

        function log(msg, type = '') {
            const term = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const line = document.createElement('div');
            line.className = `term-line ${type ? 'term-' + type : ''}`;
            line.innerHTML = `<span class="term-time">[${time}]</span> ${msg}`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        // --- BACKEND LOGIC ---
        async function initEngine() {
            const id = document.getElementById('gameId').value;
            const name = document.getElementById('botName').value;
            const amount = parseInt(document.getElementById('amountRange').value);
            const btn = document.getElementById('launchBtn');

            if (!id || !name) {
                log("CRITICAL ERROR: Game ID and Bot Prefix required.", "error");
                return;
            }

            // Lock UI
            btn.disabled = true;
            btn.innerText = "INJECTION IN PROGRESS...";
            document.getElementById('activeBots').innerText = "0";
            log(`Establishing tunnel to session ${id}...`);

            // Run the flooder
            await startFlood(id, name, amount);

            // Unlock UI
            btn.disabled = false;
            btn.innerText = "INITIALIZE ENGINE INJECTION";
        }

        async function startFlood(gameId, prefix, count) {
            let successfulJoins = 0;

            for (let i = 1; i <= count; i++) {
                const botName = `${prefix}${i}`;
                
                // 1. Simulate Network Handshake
                log(`Sending join request for ${botName}...`);
                
                // 2. The "Real" Backend Call
                // In your script.js, this is where you call your socket.emit('join') 
                // or fetch('blooket.com/api/join')
                const success = await simulateJoinRequest(gameId, botName);

                if (success) {
                    successfulJoins++;
                    document.getElementById('activeBots').innerText = successfulJoins;
                    log(`SUCCESS: ${botName} has entered the lobby.`, "success");
                } else {
                    log(`FAILED: ${botName} was rejected by server.`, "error");
                }

                // 3. Rate Limit Protection (Wait 300ms between joins)
                await new Promise(res => setTimeout(res, 300));
            }

            log(`Deployment Finished. ${successfulJoins} bots active.`, "success");
        }

        // Placeholder for the actual API connection
        async function simulateJoinRequest(id, name) {
            // This mimics the delay of a server response
            return new Promise(resolve => {
                setTimeout(() => {
                    // 95% success rate simulation
                    resolve(Math.random() > 0.05);
                }, 100);
            });
        }
    </script>
</body>
</html>
