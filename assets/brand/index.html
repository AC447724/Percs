<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERCS | Assets</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&family=Inter:wght@300;400;500&display=swap');
        
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --text: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --font-display: 'Instrument Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-body); 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            padding: 25px 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%;
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(10px);
            z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .brand { 
            display: flex; align-items: center; gap: 12px;
            font-family: var(--font-display); font-weight: 600; font-size: 18px;
            text-decoration: none; color: #fff;
        }
        .brand img { width: 32px; height: 32px; border-radius: 50%; }

        .hero {
            height: 40vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .hero h1 {
            font-family: var(--font-display); font-size: clamp(40px, 6vw, 60px);
            font-weight: 600; letter-spacing: -0.04em; margin-bottom: 15px;
        }

        .hero p {
            font-size: 16px; color: var(--text-dim);
            max-width: 500px; font-weight: 300;
        }

        section { max-width: 1200px; margin: 0 auto; padding: 60px 5%; }

        .asset-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .asset-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .asset-card:hover { border-color: #444; transform: translateY(-4px); }

        .preview {
            height: 200px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            position: relative;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .info { padding: 25px; }

        .label {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 5px;
            display: block;
        }

        .meta {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 20px;
            display: block;
            font-weight: 500;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn:hover { background: #fff; color: #000; }

        footer {
            padding: 60px 5%;
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 38px; }
            .preview { height: 180px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="https://percs.fun" class="brand">
            <img src="https://www.percs.fun/assets/percs.webp" alt="Logo">
            PERCS
        </a>
    </nav>

    <header class="hero">
        <h1>Assets.</h1>
        <p>A library of official resources for developers and community partners.</p>
    </header>

    <section>
        <div class="asset-container">
            <div class="asset-card">
                <div class="preview">
                    <img src="https://percs.fun/assets/brand/logo.png" alt="Brand Logo">
                </div>
                <div class="info">
                    <span class="label">Primary Mark</span>
                    <span class="meta">PNG • Transparent • 512px</span>
                    <button class="copy-btn" onclick="copy('https://percs.fun/assets/brand/logo.png', this)">Copy URL</button>
                </div>
            </div>

            <div class="asset-card">
                <div class="preview">
                    <img src="https://percs.fun/assets/brand/logo-no-bg.png" alt="Logo No BG">
                </div>
                <div class="info">
                    <span class="label">Minimalist Icon</span>
                    <span class="meta">PNG • No Background • 512px</span>
                    <button class="copy-btn" onclick="copy('https://percs.fun/assets/brand/logo-no-bg.png', this)">Copy URL</button>
                </div>
            </div>

            <div class="asset-card">
                <div class="preview">
                    <img src="https://percs.fun/assets/brand/banner.png" alt="Brand Banner">
                </div>
                <div class="info">
                    <span class="label">System Banner</span>
                    <span class="meta">PNG • Wide Aspect • 1100px</span>
                    <button class="copy-btn" onclick="copy('https://percs.fun/assets/brand/banner.png', this)">Copy URL</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 PERCS • Internal Repository
    </footer>

    <script>
        function copy(url, btn) {
            navigator.clipboard.writeText(url);
            const originalText = btn.innerText;
            btn.innerText = "Link Copied";
            btn.style.background = "#fff";
            btn.style.color = "#000";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
                btn.style.color = "";
            }, 1500);
        }
    </script>
</body>
</html>
