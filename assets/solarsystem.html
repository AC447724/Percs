<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap');

        body { margin: 0; background-color: #010206; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 40px;
            left: 40px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 { 
            margin: 0; 
            font-size: 24px; 
            font-weight: 500; 
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p { 
            margin: 5px 0 0; 
            font-size: 13px; 
            color: rgba(255, 255, 255, 0.4); 
            font-weight: 300;
        }

        /* Customizing the GUI to look cleaner */
        .lil-gui { 
            --background-color: rgba(15, 15, 15, 0.7);
            --backdrop-filter: blur(10px);
            --widget-color: #00f2ff;
            --focus-color: #00f2ff;
            --number-color: #00f2ff;
            font-family: 'Inter', sans-serif !important;
            box-shadow: none !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Celestial System</h1>
        <p>Simulation parameters active.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        // Configuration Object
        const params = {
            timeScale: 1.0,
            planetScale: 1.0,
            sunIntensity: 2.0,
            showOrbits: true,
            autoRotateCamera: false
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 3000);
        camera.position.set(0, 60, 150);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 1000 * params.sunIntensity, 1500);
        scene.add(sunLight);

        // GUI Setup
        const gui = new GUI({ title: 'System Settings' });
        gui.add(params, 'timeScale', 0, 5).name('Orbit Speed');
        gui.add(params, 'planetScale', 0.5, 3).name('Planet Size').onChange(val => {
            planets.forEach(p => p.mesh.scale.setScalar(val));
        });
        gui.add(params, 'sunIntensity', 0, 5).name('Sun Brightness').onChange(val => {
            sunLight.intensity = 1000 * val;
        });
        gui.add(params, 'autoRotateCamera').name('Auto-Camera');

        // Sun
        const sun = new THREE.Mesh(
            new THREE.SphereGeometry(7, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xffdd44 })
        );
        scene.add(sun);

        // Planet Creation
        const planets = [];
        const createPlanet = (size, color, distance, speed, hasRings = false) => {
            const group = new THREE.Object3D();
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(size, 32, 32),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 })
            );
            
            mesh.position.x = distance;
            group.add(mesh);

            if (hasRings) {
                const ring = new THREE.Mesh(
                    new THREE.RingGeometry(size * 1.5, size * 2.5, 64),
                    new THREE.MeshBasicMaterial({ color: 0x888888, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
                );
                ring.rotation.x = Math.PI / 2;
                mesh.add(ring);
            }

            scene.add(group);
            return { group, mesh, baseSpeed: speed };
        };

        planets.push(
            createPlanet(0.8, 0x8c8c8c, 15, 0.03),   // Mercury
            createPlanet(1.4, 0xe3bb76, 25, 0.015),  // Venus
            createPlanet(1.5, 0x2271b3, 35, 0.01),   // Earth
            createPlanet(1.0, 0xb04a2c, 45, 0.008),  // Mars
            createPlanet(4.0, 0xd39c7e, 65, 0.004),  // Jupiter
            createPlanet(3.5, 0xc5ab6e, 85, 0.002, true), // Saturn
            createPlanet(2.2, 0xbbe1e4, 105, 0.001), // Uranus
            createPlanet(2.1, 0x6081ff, 125, 0.0008) // Neptune
        );

        // Starfield
        const starVertices = [];
        for (let i = 0; i < 8000; i++) {
            starVertices.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
        }
        const stars = new THREE.Points(
            new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3)),
            new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })
        );
        scene.add(stars);

        function animate() {
            requestAnimationFrame(animate);

            planets.forEach(p => {
                p.group.rotation.y += p.baseSpeed * params.timeScale;
                p.mesh.rotation.y += 0.01;
            });

            controls.autoRotate = params.autoRotateCamera;
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
