<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4; url=https://percs.fun/free-the-weed">
    <title>Preparing Your Flight... | Free the Weed</title>
    
    <link rel="icon" type="image/png" href="https://percs.fun/assets/brand/weed.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #2e7d32; /* Rich Green */
            --primary-light: #e8f5e9; 
            --bg: #f0f4f0; 
            --text: #2d3436;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box;
        }
        
        .redirect-container { 
            text-align: center; 
            background: white; 
            padding: 50px 30px; 
            border-radius: 32px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }

        .logo-spinning { 
            width: 80px; 
            height: 80px; 
            margin-bottom: 30px;
            animation: rotateLeaf 2s linear infinite;
        }

        @keyframes rotateLeaf {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { 
            font-size: 2.2rem; 
            margin: 0 0 15px 0; 
            letter-spacing: -1.5px; 
            font-weight: 800; 
            color: #1a1a1a; 
        }

        .loading-text { 
            color: #636e72; 
            font-size: 1.1rem; 
            margin-bottom: 25px; 
        }

        .countdown { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: var(--primary); 
            background: var(--primary-light);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .manual-link { 
            margin-top: 30px; 
            font-size: 0.9rem; 
            color: #b2bec3; 
        }

        .manual-link a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 700;
        }
        
        .manual-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="redirect-container">
    <img src="https://percs.fun/assets/brand/weed.png" alt="Weed Leaf" class="logo-spinning">
    
    <h1>Higher Standards...</h1>
    <p class="loading-text">Preparing your connection to Free the Weed. Your flight departs in:</p>
    
    <div class="countdown">
        <span id="timer">4</span> seconds
    </div>

    <p class="manual-link">
        Issues with takeoff? <a href="https://percs.fun/free-the-weed">Click here to manually redirect</a>.
    </p>
</div>

<script>
    const targetURL = "https://percs.fun/free-the-weed";
    let secondsLeft = 4;
    const timerEl = document.getElementById('timer');

    const countdownInterval = setInterval(() => {
        secondsLeft--;
        timerEl.innerText = secondsLeft;

        if (secondsLeft <= 0) {
            clearInterval(countdownInterval);
            window.location.href = targetURL;
        }
    }, 1000); // Update every second

    // If JavaScript fails, the <meta http-equiv="refresh"> in the head will still work as a backup.
</script>

</body>
</html>
