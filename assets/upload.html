<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERCS | Secure Asset Uplink</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" />
    <style>
        :root {
            --p-accent: #2563eb;
            --p-bg: #0a0a0a;
            --p-card: #111111;
            --p-border: #222222;
            --p-text-main: #ffffff;
            --p-text-muted: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--p-bg);
            color: var(--p-text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .upload-card {
            background: var(--p-card);
            border: 1px solid var(--p-border);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-size: 13px;
            color: var(--p-text-muted);
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--p-text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--p-border);
            padding: 12px;
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--p-accent);
        }

        button {
            width: 100%;
            background: var(--p-accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        #result-container {
            margin-top: 24px;
            display: none;
        }

        .result-box {
            background: #1a1a1a;
            border: 1px solid var(--p-accent);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: transparent;
            color: var(--p-accent);
            font-size: 11px;
            width: auto;
            padding: 4px 8px;
            border: 1px solid var(--p-accent);
        }

        .copy-btn:hover {
            background: var(--p-accent);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="upload-card">
        <h1>Asset Uplink</h1>
        <p class="subtitle">Securely map external assets to percs.fun/assets/u/</p>

        <div class="input-group">
            <label>Source URL (GIF/PNG/JPG)</label>
            <input type="text" id="rawUrl" placeholder="https://media.discordapp.net/...">
        </div>

        <div class="input-group">
            <label>Custom Slug</label>
            <input type="text" id="slug" placeholder="server-banner-01">
        </div>

        <button onclick="createLink()" id="mainBtn">Generate Link</button>

        <div id="result-container">
            <label>Generated Asset Path</label>
            <div class="result-box">
                <span id="finalLink"></span>
                <button class="copy-btn" onclick="copyLink()">COPY</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function createLink() {
        const url = document.getElementById('rawUrl').value;
        const filename = document.getElementById('slug').value;
        const btn = document.getElementById('mainBtn');

        if (!url || !filename) return alert("All fields are mandatory.");

        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, filename })
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('result-container').style.display = 'block';
                document.getElementById('finalLink').innerText = data.link;
            } else if (response.status === 401) {
                alert("Unauthorized. Please login via /login first.");
                window.location.href = "/login";
            } else {
                alert("Error: " + data.error);
            }
        } catch (e) {
            alert("Network error. Is your API deployed?");
        } finally {
            btn.innerText = "Generate Link";
            btn.disabled = false;
        }
    }

    function copyLink() {
        const link = document.getElementById('finalLink').innerText;
        navigator.clipboard.writeText(link);
        alert("Copied to clipboard.");
    }
</script>

</body>
</html>
