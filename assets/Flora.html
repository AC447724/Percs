<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percs Flora</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;500&display=swap');

        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 { 
            margin: 0; 
            font-size: clamp(40px, 10vw, 120px); 
            font-weight: 200; 
            letter-spacing: 20px; 
            text-transform: uppercase;
            opacity: 0.5;
            filter: blur(1px);
        }

        /* Styling the Control Panel */
        .lil-gui { 
            --background-color: rgba(0, 0, 0, 0.8);
            --backdrop-filter: blur(15px);
            --widget-color: #ffffff;
            --font-family: 'Inter', sans-serif;
            --font-size: 11px;
            border-left: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Percs</h1>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        // Custom Maker Parameters
        const settings = {
            count: 30000,
            speed: 1.0,
            size: 0.7,
            distortion: 2.5,
            colorMode: 'Neon',
            glow: 0.8,
            repulsion: 45,
            pulse: true
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 250;

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;

        // Particle Assets
        let geometry = new THREE.BufferGeometry();
        let material = new THREE.PointsMaterial({
            size: settings.size,
            vertexColors: true,
            transparent: true,
            opacity: settings.glow,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        let points = new THREE.Points(geometry, material);
        scene.add(points);

        const initParticles = () => {
            const pos = new Float32Array(settings.count * 3);
            const cols = new Float32Array(settings.count * 3);
            for (let i = 0; i < settings.count; i++) {
                const i3 = i * 3;
                const angle = 0.1 * i;
                const r = 0.5 * Math.sqrt(i);
                pos[i3] = r * Math.cos(angle);
                pos[i3+1] = r * Math.sin(angle);
                pos[i3+2] = (Math.random() - 0.5) * 5;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        };
        initParticles();

        // UI Controls
        const gui = new GUI({ title: 'Design Studio' });
        gui.add(settings, 'speed', 0, 4).name('Flow Speed');
        gui.add(settings, 'size', 0.1, 2).name('Particle Size').onChange(v => material.size = v);
        gui.add(settings, 'glow', 0, 1).name('Glow').onChange(v => material.opacity = v);
        gui.add(settings, 'distortion', 0, 10).name('Chaos');
        gui.add(settings, 'repulsion', 10, 100).name('Mouse Force');
        gui.add(settings, 'colorMode', ['Neon', 'Vaporwave', 'Ghost', 'Fire']);
        gui.add(settings, 'pulse').name('Breathe');

        const mouse = new THREE.Vector2(-999, -999);
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        const raycaster = new THREE.Raycaster();

        function animate(time) {
            const t = time * 0.001 * settings.speed;
            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;

            raycaster.setFromCamera(mouse, camera);
            const intersect = new THREE.Vector3();
            raycaster.ray.at(120, intersect);

            for (let i = 0; i < settings.count; i++) {
                const i3 = i * 3;
                let x = posAttr.array[i3];
                let y = posAttr.array[i3+1];
                
                // Base movement
                const angle = 0.1 * i + t * 0.2;
                const radius = 0.7 * Math.sqrt(i);
                const pulse = settings.pulse ? Math.sin(t + i * 0.001) * 10 : 0;
                
                let targetX = radius * Math.cos(angle);
                let targetY = radius * Math.sin(angle);
                let targetZ = Math.sin(t + i * 0.05) * settings.distortion + pulse;

                // Mouse Force
                const dx = targetX - intersect.x;
                const dy = targetY - intersect.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < settings.repulsion) {
                    const ratio = (settings.repulsion - dist) / settings.repulsion;
                    targetX += dx * ratio * 3;
                    targetY += dy * ratio * 3;
                }

                posAttr.array[i3] = targetX;
                posAttr.array[i3+1] = targetY;
                posAttr.array[i3+2] = targetZ;

                // Color Themes
                if (settings.colorMode === 'Neon') {
                    colAttr.array[i3] = 0.0; colAttr.array[i3+1] = 0.9; colAttr.array[i3+2] = 1.0;
                } else if (settings.colorMode === 'Vaporwave') {
                    colAttr.array[i3] = 1.0; colAttr.array[i3+1] = 0.2; colAttr.array[i3+2] = 0.8;
                } else if (settings.colorMode === 'Fire') {
                    colAttr.array[i3] = 1.0; colAttr.array[i3+1] = 0.3; colAttr.array[i3+2] = 0.0;
                } else {
                    colAttr.array[i3] = 0.8; colAttr.array[i3+1] = 0.8; colAttr.array[i3+2] = 0.9;
                }
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate(0);
    </script>
</body>
</html>
