<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Systems | PERCS</title>
    
    <meta name="description" content="Live telemetry for the PERCS network.">
    <meta property="og:image" content="https://www.percs.fun/assets/percs.webp">
    <meta name="theme-color" content="#050505">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;600&display=swap');
        
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-mute: #666666;
            --accent: #2ecc71;
            --font-mono: 'JetBrains Mono', monospace;
            color-scheme: dark;
        }

        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: 'Instrument Sans', sans-serif; margin: 0;
            overflow-x: hidden;
        }

        /* Hardware scanline overlay */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        nav {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); background: #050505;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 5%; }

        .header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .panel {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; border-radius: 4px; display: flex; flex-direction: column;
        }

        .panel-label {
            font-family: var(--font-mono); font-size: 10px; color: var(--text-mute);
            text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
        }

        .pulse {
            width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .data-row {
            display: flex; justify-content: space-between; margin-bottom: 8px;
            font-family: var(--font-mono); font-size: 13px;
        }

        .data-label { color: var(--text-mute); }
        .data-value { color: var(--text-main); }

        .big-stat { font-family: var(--font-mono); font-size: 28px; margin: 10px 0; }
        .unit { font-size: 12px; color: var(--text-mute); }

        .meter { height: 3px; background: #1a1a1a; width: 100%; margin-top: 10px; border-radius: 2px; overflow: hidden; }
        .meter-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1s ease; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 1000px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 600;">PERCS</div>
    <div id="last-sync" style="font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);">Last Check: --:--:--</div>
</nav>

<div class="container">
    <header class="header">
        <div>
            <h1 style="font-size: 22px; margin: 0;" id="bot-tag">--</h1>
            <p style="color: var(--text-mute); font-size: 13px; margin: 5px 0 0 0;">ID: <span id="bot-id">--</span></p>
        </div>
        <div id="status-badge" style="font-family: var(--font-mono); font-size: 13px; color: var(--accent);">● OPERATIONAL</div>
    </header>

    <div class="dashboard">
        <div class="panel">
            <div class="panel-label"><span class="pulse"></span> Network Shard</div>
            <div class="big-stat" id="bot-guilds">--</div>
            <div class="data-row"><span class="data-label">Latency</span><span class="data-value" id="bot-ping">--ms</span></div>
            <div class="data-row"><span class="data-label">Cache</span><span class="data-value" id="bot-users">--</span></div>
            <div class="data-row"><span class="data-label">Channels</span><span class="data-value" id="bot-channels">--</span></div>
            <div class="data-row"><span class="data-label">Uptime</span><span class="data-value" id="bot-uptime">--</span></div>
        </div>

        <div class="panel">
            <div class="panel-label">Host Infrastructure</div>
            <div class="data-row"><span class="data-label">OS</span><span class="data-value" id="sys-os">--</span></div>
            <div class="data-row"><span class="data-label">CPU</span><span class="data-value" style="font-size: 11px;" id="sys-cpu">--</span></div>
            
            <div style="margin-top: 15px;">
                <div class="data-row"><span class="data-label">CPU Load</span><span id="sys-cpu-load">--%</span></div>
                <div class="meter"><div id="fill-cpu" class="meter-fill"></div></div>
            </div>

            <div style="margin-top: 15px;">
                <div class="data-row"><span class="data-label">RAM Usage</span><span id="sys-ram-pct">--%</span></div>
                <div class="meter"><div id="fill-ram" class="meter-fill"></div></div>
                <div style="font-size: 10px; color: var(--text-mute); margin-top: 5px;" id="sys-ram-mb">-- / -- MB</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-label">Process Environment</div>
            <div class="data-row"><span class="data-label">Node JS</span><span class="data-value" id="proc-node">--</span></div>
            <div class="data-row"><span class="data-label">PID</span><span class="data-value" id="proc-pid">--</span></div>
            <div class="data-row"><span class="data-label">Heap Use</span><span class="data-value" id="proc-heap">-- MB</span></div>
            <div class="data-row"><span class="data-label">RSS Use</span><span class="data-value" id="proc-rss">-- MB</span></div>
            <div style="margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border);">
                <div class="data-row" style="margin-bottom: 0;">
                    <span class="data-label">RAM/Guild</span>
                    <span class="data-value" id="proc-per-guild" style="color: var(--accent);">-- MB</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function update() {
        try {
            const res = await fetch('/api/status');
            const d = await res.json();
            const isOnline = d && (Date.now() - (d.last_sync || 0) < 180000);

            if (isOnline) {
                // Header
                document.getElementById('bot-tag').innerText = d.bot.tag;
                document.getElementById('bot-id').innerText = d.bot.id;
                
                // Bot Panel
                document.getElementById('bot-guilds').innerHTML = `${d.bot.cached_guilds} <span class="unit">Guilds</span>`;
                document.getElementById('bot-ping').innerText = `${d.bot.ping}ms`;
                document.getElementById('bot-users').innerText = d.bot.cached_users.toLocaleString();
                document.getElementById('bot-channels').innerText = d.bot.cached_channels.toLocaleString();
                document.getElementById('bot-uptime').innerText = d.bot.uptime_formatted;

                // Hardware Panel
                document.getElementById('sys-os').innerText = d.system.platform + " " + d.system.release;
                document.getElementById('sys-cpu').innerText = d.system.cpu;
                document.getElementById('sys-cpu-load').innerText = d.system.cpu_load;
                document.getElementById('fill-cpu').style.width = d.system.cpu_load;
                document.getElementById('sys-ram-pct').innerText = d.system.ram_usage_percent;
                document.getElementById('fill-ram').style.width = d.system.ram_usage_percent;
                document.getElementById('sys-ram-mb').innerText = `${Math.round(d.system.ram_used_mb)} / ${Math.round(d.system.ram_total_mb)} MB`;

                // Process Panel
                document.getElementById('proc-node').innerText = d.process.node_version;
                document.getElementById('proc-pid').innerText = d.process.pid;
                document.getElementById('proc-heap').innerText = d.process.memory_heap_mb;
                document.getElementById('proc-rss').innerText = d.process.memory_rss_mb;
                document.getElementById('proc-per-guild').innerText = d.process.memory_per_guild_mb + " MB";

                document.getElementById('last-sync').innerText = `SYNC: ${new Date(d.last_sync).toLocaleTimeString()}`;
                document.getElementById('status-badge').innerText = "● OPERATIONAL";
                document.getElementById('status-badge').style.color = "var(--accent)";
            } else {
                document.getElementById('status-badge').innerText = "○ DISCONNECTED";
                document.getElementById('status-badge').style.color = "#f23f43";
            }
        } catch (e) { console.error("Sync Error:", e); }
    }

    update();
    setInterval(update, 300000);
</script>
</body>
</html>
