<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status | PERCS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;600&display=swap');
        
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --border: #141414;
            --text-main: #ffffff;
            --text-mute: #555555;
            --accent: #0070f3; /* High-end Vercel Blue */
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; transition: background 0.2s; }
        body { 
            background: var(--bg); color: var(--text-main); 
            font-family: var(--font-sans); margin: 0; padding: 0;
            line-height: 1.5;
        }

        nav {
            padding: 16px 40px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* The Dashboard Grid */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid var(--border); border-left: 1px solid var(--border);
        }

        .panel {
            padding: 30px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .panel:hover { background: var(--surface); }

        .label { 
            font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); 
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }

        .value { font-family: var(--font-mono); font-size: 24px; font-weight: 500; margin-bottom: 4px; }
        .sub-value { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); }

        /* Shard Grid */
        .shard-list { margin-top: 40px; border-top: 1px solid var(--border); }
        .shard-row {
            display: grid; grid-template-columns: 1fr 2fr 1fr; 
            padding: 16px 30px; border-bottom: 1px solid var(--border);
            font-family: var(--font-mono); font-size: 12px;
        }

        /* Hardware info section */
        .hardware-info { grid-column: span 3; padding: 30px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--surface); }

        .meter-bg { height: 1px; background: #222; width: 100%; margin: 15px 0; overflow: hidden; }
        .meter-fill { height: 100%; background: var(--accent); width: 0%; transition: width 1.5s cubic-bezier(0.1, 0, 0, 1); }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            .hardware-info { grid-column: span 1; }
        }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 600; font-family: var(--font-mono); font-size: 13px;">PERCS</div>
    <div id="last-sync" style="font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);">UPDATING...</div>
</nav>

<div class="container">
    <div class="grid">
        <div class="panel">
            <div class="label">Distribution</div>
            <div class="value" id="val-guilds">--</div>
            <div class="sub-value">Active Discord Guilds</div>
        </div>

        <div class="panel">
            <div class="label">Heartbeat</div>
            <div class="value" id="val-ping">--ms</div>
            <div class="sub-value">API Response Latency</div>
        </div>

        <div class="panel">
            <div class="label">Uptime</div>
            <div class="value" id="val-uptime" style="font-size: 18px;">--</div>
            <div class="sub-value">Bot Process Life</div>
        </div>

        <div class="hardware-info">
            <div class="label">Compute Infrastructure</div>
            <div style="font-family: var(--font-mono); font-size: 14px; margin-bottom: 10px;" id="val-cpu-name">--</div>
            
            <div style="display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);">
                <span>MEMORY ALLOCATION</span>
                <span id="val-memory-text">-- / --</span>
            </div>
            <div class="meter-bg"><div id="fill-ram" class="meter-fill"></div></div>

            <div style="display: flex; gap: 40px; margin-top: 10px;">
                <div>
                    <div class="label" style="margin-bottom: 5px;">CPU Load</div>
                    <div class="value" style="font-size: 16px;" id="val-cpu-load">--%</div>
                </div>
                <div>
                    <div class="label" style="margin-bottom: 5px;">Platform</div>
                    <div class="value" style="font-size: 16px;" id="val-os">--</div>
                </div>
            </div>
        </div>
    </div>

    <div class="shard-list" id="shard-grid">
        </div>
</div>

<script>
    function formatMemory(mb) {
        if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
        return Math.round(mb).toLocaleString() + ' MB';
    }

    async function update() {
        try {
            const res = await fetch('/api/status');
            const d = await res.json();
            const isOnline = d && (Date.now() - (d.last_sync || 0) < 300000);

            if (isOnline) {
                document.getElementById('val-guilds').innerText = d.bot.cached_guilds.toLocaleString();
                document.getElementById('val-ping').innerText = d.bot.ping;
                document.getElementById('val-uptime').innerText = d.bot.uptime_formatted;

                // Memory Allocation Display: "12,783 MB / 192 GB"
                const used = d.system.ram_used_mb;
                const total = d.system.ram_total_mb;
                document.getElementById('val-memory-text').innerText = `${Math.round(used).toLocaleString()} MB / ${formatMemory(total)}`;
                document.getElementById('fill-ram').style.width = d.system.ram_usage_percent;

                // Actual CPU Name from API
                document.getElementById('val-cpu-name').innerText = d.system.cpu;
                document.getElementById('val-cpu-load').innerText = d.system.cpu_load;
                document.getElementById('val-os').innerText = d.system.platform.toUpperCase();

                // Build Shards
                const shardContainer = document.getElementById('shard-grid');
                shardContainer.innerHTML = ''; 
                for (let i = 0; i < d.bot.shard_count; i++) {
                    const isActive = d.bot.current_shard === i;
                    shardContainer.innerHTML += `
                        <div class="shard-row" style="${isActive ? 'color: var(--accent);' : 'color: var(--text-mute);'}">
                            <span>SHARD ${i}</span>
                            <span>${d.bot.cached_users.toLocaleString()} USERS ${d.bot.cached_channels} CHANNELS</span>
                            <span style="text-align: right;">${isActive ? '● Active' : '○ STANDBY'}</span>
                        </div>
                    `;
                }

                document.getElementById('last-sync').innerText = `LAST_SYNC: ${new Date(d.last_sync).toLocaleTimeString()}`;
            }
        } catch (e) { console.error(e); }
    }

    update();
    setInterval(update, 240000); // 4 minutes
</script>
</body>
</html>
